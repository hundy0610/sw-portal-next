name: Cache Warming (SW/License/Tickets)

on:
  schedule:
    # 30분마다 실행 — HW 제외 데이터 warm (HW는 warm-hw.yml에서 직접 처리)
    # 월 사용량: 1,440회 × ~30s ≈ 720분/월
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Warm SW/License/Ticket cache
        run: |
          echo "🔥 캐시 워밍 시작 (SW/라이선스/티켓): $(date)"

          BASE_URL="https://swportal.vercel.app"

          RESPONSE=$(curl -s -o response.txt -w "%{http_code}" \
            -X GET "${BASE_URL}/api/cron/warm-cache" \
            --max-time 45)

          echo "응답 상태: $RESPONSE"
          cat response.txt 2>/dev/null | head -c 300 || true

          if [ "$RESPONSE" = "200" ]; then
            echo "✅ 캐시 워밍 완료"
          else
            echo "⚠️ 응답 코드: $RESPONSE"
            exit 0
          fi
