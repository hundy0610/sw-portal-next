name: Cache Warming

on:
  schedule:
    # 매 5분마다 실행 — Vercel 함수 warm 유지 + Notion 캐시 사전 적재
    - cron: "*/5 * * * *"
  workflow_dispatch: # 수동 실행 버튼

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Warm Notion cache
        run: |
          echo "🔥 캐시 워밍 시작: $(date)"

          BASE_URL="https://swportal.vercel.app"

          RESPONSE=$(curl -s -o response.txt -w "%{http_code}" \
            -X GET "${BASE_URL}/api/cron/warm-cache" \
            --max-time 45)

          echo "응답 상태: $RESPONSE"
          cat response.txt 2>/dev/null | head -c 300 || true

          if [ "$RESPONSE" = "200" ]; then
            echo "✅ 캐시 워밍 완료"
          else
            echo "⚠️ 응답 코드: $RESPONSE"
            # 200이 아니어도 워크플로우는 성공으로 처리 (일시적 오류 허용)
            exit 0
          fi
