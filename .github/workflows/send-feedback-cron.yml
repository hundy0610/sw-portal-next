name: Send Feedback Emails (Cron)

on:
  schedule:
    # 1시간마다 실행 — Notion 웹훅이 주 트리거, 크론은 어디까지나 안전망이라
    # 완료 후 최대 1시간 지연은 사용자 경험에 영향 없음 (Redis 명령 절감)
    - cron: '0 * * * *'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  send-feedback:
    runs-on: ubuntu-latest
    steps:
      - name: Call send-feedback cron endpoint
        run: |
          response=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://swportal.vercel.app/api/cron/send-feedback)
          echo "HTTP Status: $response"
          cat /tmp/response.json
          if [ "$response" != "200" ]; then
            echo "Error: Non-200 response"
            exit 1
          fi
