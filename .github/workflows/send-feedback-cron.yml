name: Send Feedback Emails (Cron)

on:
  schedule:
    # 30분마다 실행 — Notion 웹훅이 주 트리거, 크론은 안전망
    # 월 사용량: 1,440회 × ~30s ≈ 720분/월
    - cron: '*/30 * * * *'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  send-feedback:
    runs-on: ubuntu-latest
    steps:
      - name: Call send-feedback cron endpoint
        run: |
          response=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://swportal.vercel.app/api/cron/send-feedback)
          echo "HTTP Status: $response"
          cat /tmp/response.json
          if [ "$response" != "200" ]; then
            echo "Error: Non-200 response"
            exit 1
          fi
