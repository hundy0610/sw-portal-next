name: HW Cache Warming (Direct Notion → Upstash)

on:
  schedule:
    # 2시간마다 실행 — Notion 직접 수정은 2시간 내 반영
    # (Upstash Redis 무료 티어 월 명령 한도 초과가 확인돼 30분→2시간으로 되돌림 —
    #  다른 코드/문서의 기존 주석도 2시간을 전제로 하고 있었음)
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  warm-hw:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Warm HW cache (Notion → Upstash 직접)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: node .github/scripts/warm-hw.mjs
